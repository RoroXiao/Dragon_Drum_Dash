	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
	<title>龙舟击鼓竞速</title>
	<style>
	*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
	html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;background:#0b1620}
	canvas{display:block;width:100%;height:100%}
	</style>
	</head>
	<body>
	<canvas id="c"></canvas>
	<script>
	(function(){
	'use strict';
	/* ===== Canvas 初始化 ===== */
	const cvs = document.getElementById('c');
	const ctx = cvs.getContext('2d');
	let W, H, dpr;
	function resize(){
	  dpr = Math.min(window.devicePixelRatio || 1, 3);
	  W = window.innerWidth;
	  H = window.innerHeight;
	  cvs.width = W * dpr;
	  cvs.height = H * dpr;
	  cvs.style.width = W + 'px';
	  cvs.style.height = H + 'px';
	  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
	}
	window.addEventListener('resize', resize);
	resize();
	/* ===== 颜色常量 ===== */
	const COL = {
	  skyTop: '#0b1620',
	  skyBot: '#1d3c3e',
	  mountainFar: 'rgba(45, 65, 70, 0.5)',
	  mountainNear: 'rgba(25, 45, 50, 0.8)',
	  water1: '#0a2629',
	  water2: '#103338',
	  water3: '#17524f',
	  wave: 'rgba(45, 196, 182, 0.3)',
	  waveHigh: 'rgba(93, 245, 224, 0.7)',
	  drumFace: '#e6b800',
	  drumFaceCenter: '#ffcc33',
	  drumRim: '#990000',
	  drumRimDark: '#4a0000',
	  drumWood: '#3a2415',
	  drumGold: '#ffd633',
	  dragonBody: '#a83229',
	  dragonBodyDark: '#6a1f1a',
	  dragonHead: '#c0392b',
	  dragonGold: '#f1c40f',
	  textWhite: '#f0e6d3',
	  textGold: '#f5d442',
	  perfectCol: '#ff6b6b',
	  goodCol: '#ffd93d',
	  missCol: '#95a5a6',
	};
	/* ===== 游戏状态 ===== */
	const STATE = { MENU: 0, PLAY: 1, RESULT: 2 };
	let state = STATE.MENU;
	/* ===== 游戏变量 ===== */
	let speed = 0;          // 当前速度
	let distance = 0;       // 总距离
	let timeLeft = 30;      // 剩余时间
	let lastTime = 0;
	/* 鼓相关 */
	let drumX, drumY, drumR, drumCenterR;
	let ringRadius = 0;     // 当前光环半径
	let ringActive = true;   // 光环是否活跃
	let ringSpeed = 0;       // 光环收缩速度
	/* 飘字 */
	let floatTexts = [];
	/* 鼓震动 */
	let drumScale = 1;
	let drumShake = 0;
	/* 龙舟 */
	let boatY = 0;
	let boatBobPhase = 0;
	let boatSquash = 1;  // 水平拉伸
	/* 背景层偏移 */
	let bgOffset1 = 0; // 远山
	let bgOffset2 = 0; // 中景水波
	let bgOffset3 = 0; // 近景浪花
	/* 粒子 */
	let splashParticles = [];
	let hitParticles = [];
	/* ===== 初始化游戏 ===== */
	function initGame(){
	  speed = 0;
	  distance = 0;
	  timeLeft = 30;
	  lastTime = 0;
	  floatTexts = [];
	  drumScale = 1;
	  drumShake = 0;
	  boatBobPhase = 0;
	  boatSquash = 1;
	  bgOffset1 = 0;
	  bgOffset2 = 0;
	  bgOffset3 = 0;
	  splashParticles = [];
	  hitParticles = [];
	  // 鼓参数
	  drumR = Math.min(W, H) * 0.14;
	  drumCenterR = drumR * 0.38;
	  drumX = W / 2;
	  drumY = H * 0.78;
	  boatY = H * 0.22;
	  // 初始光环
	  resetRing();
	}
	function resetRing(){
	  ringRadius = drumR * 2.5;
	  ringActive = true;
	  ringSpeed = (drumR * 2.5 - drumCenterR) / 90; // ~90帧到达
	}
	/* ===== 输入处理 ===== */
	function handleTap(){
	  if(state === STATE.MENU){
	    state = STATE.PLAY;
	    initGame();
	    lastTime = performance.now();
	    return;
	  }
	  if(state === STATE.RESULT){
	    state = STATE.PLAY;
	    initGame();
	    lastTime = performance.now();
	    return;
	  }
	  if(state !== STATE.PLAY) return;
	  // 判定
	  if(!ringActive){
	    speed = Math.max(0, speed - 1);
	    addFloatText('失误', drumX, drumY - drumR * 1.5, COL.missCol);
	    triggerDrumHit();
	    return;
	  }
	  const diff = Math.abs(ringRadius - drumCenterR);
	  if(diff < 15){
	    speed += 4;
	    addFloatText('完美+4', drumX, drumY - drumR * 1.5, COL.perfectCol);
	    triggerHitExplosion(COL.perfectCol);
	    resetRing();
	  } else if(diff < 35){
	    speed += 2;
	    addFloatText('不错+2', drumX, drumY - drumR * 1.5, COL.goodCol);
	    triggerHitExplosion(COL.goodCol);
	    resetRing();
	  } else {
	    speed = Math.max(0, speed - 1);
	    addFloatText('失误', drumX, drumY - drumR * 1.5, COL.missCol);
	    resetRing();
	  }
	  triggerDrumHit();
	}
	function triggerDrumHit(){
	  drumScale = 1.15;
	  drumShake = 8;
	  // 添加浪花
	  for(let i = 0; i < Math.min(speed * 2, 20); i++){
	    splashParticles.push({
	      x: W / 2 + (Math.random() - 0.5) * W * 0.6,
	      y: boatY + 20 + Math.random() * 10,
	      vx: (Math.random() - 0.5) * 3 - speed * 0.3,
	      vy: -Math.random() * 4 - 2,
	      life: 1,
	      size: 2 + Math.random() * 4,
	    });
	  }
	}
	function triggerHitExplosion(color) {
	  for(let i = 0; i < 15; i++) {
	    const angle = Math.random() * Math.PI * 2;
	    const sp = 2 + Math.random() * 4;
	    hitParticles.push({
	      x: drumX,
	      y: drumY,
	      vx: Math.cos(angle) * sp,
	      vy: Math.sin(angle) * sp,
	      life: 1,
	      size: 3 + Math.random() * 3,
	      color: color
	    });
	  }
	}
	function addFloatText(text, x, y, color){
	  floatTexts.push({ text, x, y, color, life: 1, vy: -2 });
	}
	/* ===== 事件监听 ===== */
	cvs.addEventListener('mousedown', function(e){ e.preventDefault(); handleTap(); });
	cvs.addEventListener('touchstart', function(e){ e.preventDefault(); handleTap(); }, { passive: false });
	/* ===== 绘制函数 ===== */
	// 远山 (水墨风)
	function drawMountains(offset){
	  ctx.save();
	  const mw = W * 3;
	  const ox = -(offset % (mw / 2));
	  // 远山
	  ctx.fillStyle = COL.mountainFar;
	  ctx.beginPath();
	  ctx.moveTo(ox, H * 0.42);
	  for(let x = 0; x <= mw; x += 80){
	    const h = 50 + Math.sin((x + 100) * 0.003) * 60 + Math.sin((x + 200) * 0.007) * 35;
	    ctx.quadraticCurveTo(ox + x + 40, H * 0.42 - h - 20, ox + x + 80, H * 0.42 - h);
	  }
	  ctx.lineTo(ox + mw, H * 0.42);
	  ctx.closePath();
	  ctx.fill();
	  // 近山
	  ctx.fillStyle = COL.mountainNear;
	  ctx.beginPath();
	  ctx.moveTo(ox, H * 0.45);
	  for(let x = 0; x <= mw; x += 60){
	    const h = 35 + Math.sin((x + 500) * 0.005) * 45 + Math.cos((x + 300) * 0.009) * 30;
	    ctx.quadraticCurveTo(ox + x + 30, H * 0.45 - h - 15, ox + x + 60, H * 0.45 - h);
	  }
	  ctx.lineTo(ox + mw, H * 0.45);
	  ctx.closePath();
	  ctx.fill();
	  ctx.restore();
	}
	// 水面
	function drawWater(offset, t){
	  // 水面渐变
	  const grd = ctx.createLinearGradient(0, H * 0.4, 0, H * 0.65);
	  grd.addColorStop(0, COL.water1);
	  grd.addColorStop(0.5, COL.water2);
	  grd.addColorStop(1, COL.water3);
	  ctx.fillStyle = grd;
	  ctx.fillRect(0, H * 0.4, W, H * 0.25);
	  // 动态波纹高光
	  ctx.save();
	  ctx.globalAlpha = 0.4;
	  ctx.strokeStyle = COL.wave;
	  ctx.lineWidth = 1.5;
	  for(let row = 0; row < 6; row++){
	    const baseY = H * 0.42 + row * (H * 0.035);
	    ctx.beginPath();
	    for(let x = 0; x < W; x += 4){
	      const y = baseY + Math.sin((x + offset * 2 + row * 80) * 0.02 + t * 2) * (3 + row);
	      if(x === 0) ctx.moveTo(x, y);
	      else ctx.lineTo(x, y);
	    }
	    ctx.stroke();
	  }
	  ctx.restore();
	}
	// 近景浪花
	function drawWaves(offset, t){
	  ctx.save();
	  const waveY = H * 0.55;
	  for(let i = 0; i < 3; i++){
	    ctx.globalAlpha = 0.15 + i * 0.1;
	    ctx.fillStyle = i === 2 ? COL.waveHigh : COL.wave;
	    ctx.beginPath();
	    const ox = -(offset * (3 + i) % W);
	    ctx.moveTo(ox, waveY + i * 15);
	    for(let x = 0; x <= W * 2; x += 8){
	      const amp = 8 + speed * 0.5 + i * 4;
	      const y = waveY + i * 15 + Math.sin((x + ox) * 0.015 + t * 3 + i) * amp;
	      ctx.lineTo(ox + x, y);
	    }
	    ctx.lineTo(ox + W * 2, H);
	    ctx.lineTo(ox, H);
	    ctx.closePath();
	    ctx.fill();
	  }
	  ctx.restore();
	}
	// 龙舟 (精细化)
	function drawDragonBoat(t){
	  ctx.save();
	  const bx = W / 2;
	  const by = boatY + Math.sin(boatBobPhase) * 5;
	  const sw = boatSquash;
	  ctx.translate(bx, by);
	  ctx.scale(sw, 1);
	  // 船身阴影
	  ctx.fillStyle = 'rgba(0,0,0,0.3)';
	  ctx.beginPath();
	  ctx.ellipse(0, 22, 70, 6, 0, 0, Math.PI * 2);
	  ctx.fill();
	  // 船身底
	  ctx.fillStyle = COL.dragonBodyDark;
	  ctx.beginPath();
	  ctx.moveTo(-65, 5);
	  ctx.quadraticCurveTo(0, 25, 65, 5);
	  ctx.lineTo(60, -2);
	  ctx.lineTo(-60, -2);
	  ctx.closePath();
	  ctx.fill();
	  // 船身甲板
	  ctx.fillStyle = COL.dragonBody;
	  ctx.beginPath();
	  ctx.moveTo(-60, -2);
	  ctx.quadraticCurveTo(0, 15, 60, -2);
	  ctx.lineTo(55, -8);
	  ctx.lineTo(-55, -8);
	  ctx.closePath();
	  ctx.fill();
	  // 木纹装饰
	  ctx.strokeStyle = COL.dragonGold;
	  ctx.lineWidth = 1.5;
	  ctx.beginPath();
	  ctx.moveTo(-50, -2);
	  ctx.quadraticCurveTo(0, 12, 50, -2);
	  ctx.stroke();
	  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
	  ctx.lineWidth = 1;
	  for(let i = -40; i < 40; i += 15) {
	    ctx.beginPath();
	    ctx.moveTo(i, -4);
	    ctx.lineTo(i + 5, 10);
	    ctx.stroke();
	  }
	  // 龙头
	  ctx.fillStyle = COL.dragonHead;
	  ctx.beginPath();
	  ctx.moveTo(55, -5);
	  ctx.quadraticCurveTo(85, -25, 95, -15);
	  ctx.quadraticCurveTo(105, -5, 90, 5);
	  ctx.lineTo(60, 5);
	  ctx.closePath();
	  ctx.fill();
	  // 龙嘴细节
	  ctx.fillStyle = '#800000';
	  ctx.beginPath();
	  ctx.moveTo(88, -2);
	  ctx.lineTo(98, -5);
	  ctx.lineTo(95, 0);
	  ctx.closePath();
	  ctx.fill();
	  // 龙眼
	  ctx.fillStyle = '#fff';
	  ctx.beginPath();
	  ctx.arc(82, -12, 4, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.fillStyle = '#000';
	  ctx.beginPath();
	  ctx.arc(83, -11, 2, 0, Math.PI * 2);
	  ctx.fill();
	  // 龙角
	  ctx.strokeStyle = COL.dragonGold;
	  ctx.lineWidth = 3;
	  ctx.lineCap = 'round';
	  ctx.beginPath();
	  ctx.moveTo(80, -18);
	  ctx.quadraticCurveTo(75, -35, 65, -30);
	  ctx.stroke();
	  // 龙尾
	  ctx.fillStyle = COL.dragonBody;
	  ctx.beginPath();
	  ctx.moveTo(-60, -2);
	  ctx.quadraticCurveTo(-85, -15, -95, 0);
	  ctx.quadraticCurveTo(-85, 10, -60, 5);
	  ctx.closePath();
	  ctx.fill();
	  // 尾鳍
	  ctx.fillStyle = COL.dragonBodyDark;
	  ctx.beginPath();
	  ctx.moveTo(-90, -5);
	  ctx.lineTo(-110, -15);
	  ctx.lineTo(-95, 5);
	  ctx.closePath();
	  ctx.fill();
	  // 船桨
	  const paddleAngle = Math.sin(t * 8) * 0.4;
	  ctx.save();
	  ctx.translate(15, 10);
	  ctx.rotate(paddleAngle - 0.4);
	  ctx.fillStyle = '#5c3317';
	  ctx.fillRect(-1.5, 0, 3, 25);
	  ctx.fillStyle = '#8B4513';
	  ctx.beginPath();
	  ctx.ellipse(0, 25, 5, 8, 0, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.restore();
	  ctx.save();
	  ctx.translate(-15, 10);
	  ctx.rotate(-paddleAngle + 0.4);
	  ctx.fillStyle = '#5c3317';
	  ctx.fillRect(-1.5, 0, 3, 25);
	  ctx.fillStyle = '#8B4513';
	  ctx.beginPath();
	  ctx.ellipse(0, 25, 5, 8, 0, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.restore();
	  // 船上鼓手
	  ctx.fillStyle = COL.dragonGold;
	  ctx.beginPath();
	  ctx.arc(0, -15, 7, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.fillStyle = '#c0392b';
	  ctx.fillRect(-6, -8, 12, 12);
	  ctx.restore();
	}
	// 大鼓 (立体质感与红绸)
	function drawDrum(){
	  ctx.save();
	  const sx = drumScale;
	  const sy = 1 / drumScale;
	  const shakeX = (Math.random() - 0.5) * drumShake;
	  const shakeY = (Math.random() - 0.5) * drumShake;
	  ctx.translate(drumX + shakeX, drumY + shakeY);
	  ctx.scale(sx, sy);
	  const rimH = drumR * 0.25;
	  // 鼓身侧面
	  const sideGrd = ctx.createLinearGradient(-drumR, 0, drumR, 0);
	  sideGrd.addColorStop(0, COL.drumRimDark);
	  sideGrd.addColorStop(0.5, COL.drumRim);
	  sideGrd.addColorStop(1, COL.drumRimDark);
	  ctx.fillStyle = sideGrd;
	  ctx.beginPath();
	  ctx.ellipse(0, rimH, drumR, drumR * 0.28, 0, 0, Math.PI);
	  ctx.lineTo(-drumR, 0);
	  ctx.closePath();
	  ctx.fill();
	  // 鼓身木纹
	  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
	  ctx.lineWidth = 2;
	  for(let i = 0; i < 6; i++) {
	    const ang = (i / 6) * Math.PI;
	    const x1 = Math.cos(ang) * drumR * 0.9;
	    const x2 = Math.cos(ang) * drumR * 0.9;
	    ctx.beginPath();
	    ctx.moveTo(x1, 0);
	    ctx.lineTo(x2, rimH);
	    ctx.stroke();
	  }
	  // 金色铆钉
	  ctx.fillStyle = COL.drumGold;
	  for(let i = 0; i < 8; i++) {
	    const ang = (i / 8) * Math.PI;
	    const x = Math.cos(ang) * drumR * 0.85;
	    ctx.beginPath();
	    ctx.arc(x, rimH * 0.5, 3, 0, Math.PI * 2);
	    ctx.fill();
	  }
	  // 鼓边
	  ctx.strokeStyle = COL.drumGold;
	  ctx.lineWidth = 4;
	  ctx.beginPath();
	  ctx.ellipse(0, rimH, drumR, drumR * 0.28, 0, 0, Math.PI);
	  ctx.stroke();
	  // 鼓面
	  const faceGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, drumR);
	  faceGrd.addColorStop(0, COL.drumFaceCenter);
	  faceGrd.addColorStop(0.6, COL.drumFace);
	  faceGrd.addColorStop(1, '#b8860b');
	  ctx.fillStyle = faceGrd;
	  ctx.beginPath();
	  ctx.ellipse(0, 0, drumR, drumR * 0.28, 0, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.strokeStyle = COL.drumRim;
	  ctx.lineWidth = 3;
	  ctx.stroke();
	  // 鼓面纹理 - 同心圆
	  ctx.strokeStyle = 'rgba(139,0,0,0.2)';
	  ctx.lineWidth = 1;
	  for(let r = drumCenterR * 1.5; r < drumR; r += 8){
	    ctx.beginPath();
	    ctx.ellipse(0, 0, r, r * 0.28, 0, 0, Math.PI * 2);
	    ctx.stroke();
	  }
	  // 鼓心标记
	  ctx.fillStyle = 'rgba(178,34,34,0.35)';
	  ctx.beginPath();
	  ctx.ellipse(0, 0, drumCenterR, drumCenterR * 0.28, 0, 0, Math.PI * 2);
	  ctx.fill();
	  // 红绸飘带 (左侧)
	  ctx.fillStyle = '#cc0000';
	  ctx.beginPath();
	  ctx.moveTo(-drumR, 0);
	  ctx.quadraticCurveTo(-drumR - 30, 10, -drumR - 20 + Math.sin(performance.now()*0.005)*10, 40);
	  ctx.quadraticCurveTo(-drumR - 10, 10, -drumR, 10);
	  ctx.closePath();
	  ctx.fill();
	  // 红绸飘带 (右侧)
	  ctx.beginPath();
	  ctx.moveTo(drumR, 0);
	  ctx.quadraticCurveTo(drumR + 30, 10, drumR + 20 + Math.sin(performance.now()*0.005)*10, 40);
	  ctx.quadraticCurveTo(drumR + 10, 10, drumR, 10);
	  ctx.closePath();
	  ctx.fill();
	  // 光环
	  if(ringActive && ringRadius > 0){
	    const ringAlpha = Math.max(0.2, 1 - (ringRadius - drumCenterR) / (drumR * 2.5));
	    const diff = Math.abs(ringRadius - drumCenterR);
	    let col = '#ffffff';
	    if (diff < 15) col = COL.perfectCol;
	    else if (diff < 35) col = COL.goodCol;
	    ctx.shadowBlur = 15;
	    ctx.shadowColor = col;
	    ctx.strokeStyle = `rgba(245,212,66,${ringAlpha.toFixed(2)})`;
	    ctx.lineWidth = 4;
	    ctx.beginPath();
	    ctx.ellipse(0, 0, ringRadius, ringRadius * 0.28, 0, 0, Math.PI * 2);
	    ctx.stroke();
	    ctx.shadowBlur = 0;
	  }
	  ctx.restore();
	}
	// 浪花粒子
	function drawSplash(){
	  ctx.save();
	  for(const p of splashParticles){
	    ctx.globalAlpha = p.life;
	    ctx.fillStyle = COL.waveHigh;
	    ctx.beginPath();
	    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
	    ctx.fill();
	  }
	  ctx.restore();
	}
	// 击中爆裂粒子
	function drawHitParticles(){
	  ctx.save();
	  for(const p of hitParticles){
	    ctx.globalAlpha = p.life;
	    ctx.fillStyle = p.color;
	    ctx.beginPath();
	    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
	    ctx.fill();
	  }
	  ctx.restore();
	}
	// 飘字
	function drawFloatTexts(){
	  ctx.save();
	  for(const ft of floatTexts){
	    ctx.globalAlpha = ft.life;
	    ctx.fillStyle = ft.color;
	    ctx.font = `bold 22px "PingFang SC","Microsoft YaHei",sans-serif`;
	    ctx.textAlign = 'center';
	    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
	    ctx.lineWidth = 3;
	    ctx.strokeText(ft.text, ft.x, ft.y);
	    ctx.fillText(ft.text, ft.x, ft.y);
	  }
	  ctx.restore();
	}
	// UI
	function drawUI(){
	  ctx.save();
	  ctx.fillStyle = COL.textWhite;
	  ctx.font = `bold 20px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
	  ctx.lineWidth = 3;
	  ctx.textAlign = 'left';
	  ctx.strokeText('⏱ ' + Math.ceil(timeLeft) + 's', 16, 36);
	  ctx.fillText('⏱ ' + Math.ceil(timeLeft) + 's', 16, 36);
	  ctx.textAlign = 'right';
	  ctx.strokeText('🛶 ' + Math.floor(distance) + 'm', W - 16, 36);
	  ctx.fillText('🛶 ' + Math.floor(distance) + 'm', W - 16, 36);
	  // 速度条
	  const barW = 80;
	  const barH = 6;
	  const barX = W / 2 - barW / 2;
	  const barY = 26;
	  ctx.fillStyle = 'rgba(255,255,255,0.2)';
	  ctx.fillRect(barX, barY, barW, barH);
	  const sp = Math.min(speed / 20, 1);
	  const barGrd = ctx.createLinearGradient(barX, 0, barX + barW, 0);
	  barGrd.addColorStop(0, '#2ec4b6');
	  barGrd.addColorStop(1, '#ff6b6b');
	  ctx.fillStyle = barGrd;
	  ctx.fillRect(barX, barY, barW * sp, barH);
	  ctx.restore();
	}
	// 水墨装饰背景
	function drawInkBg() {
	  ctx.save();
	  ctx.fillStyle = 'rgba(0,0,0,0.1)';
	  ctx.beginPath();
	  ctx.ellipse(W * 0.1, H * 0.1, W * 0.3, H * 0.15, 0, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.beginPath();
	  ctx.ellipse(W * 0.9, H * 0.8, W * 0.4, H * 0.2, 0, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.restore();
	}
	// 开始界面
	function drawMenu(){
	  ctx.save();
	  const grd = ctx.createLinearGradient(0, 0, 0, H);
	  grd.addColorStop(0, '#0b1620');
	  grd.addColorStop(0.5, '#1d3c3e');
	  grd.addColorStop(1, '#0a2629');
	  ctx.fillStyle = grd;
	  ctx.fillRect(0, 0, W, H);
	  drawInkBg();
	  // 标题
	  ctx.fillStyle = COL.textGold;
	  ctx.font = `bold ${Math.min(28, W * 0.07)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.textAlign = 'center';
	  ctx.strokeStyle = '#000';
	  ctx.lineWidth = 4;
	  ctx.strokeText('🐉 龙舟击鼓竞速小游戏 🐉', W / 2, H * 0.22);
	  ctx.fillText('🐉 龙舟击鼓竞速小游戏 🐉', W / 2, H * 0.22);
	  // 副标题
	  ctx.fillStyle = COL.textWhite;
	  ctx.font = `${Math.min(22, W * 0.055)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('端午安康', W / 2, H * 0.30);
	  // 规则
	  ctx.fillStyle = 'rgba(240,230,211,0.7)';
	  ctx.font = `${Math.min(16, W * 0.04)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('光环重合时点击屏幕，节奏越准龙舟越快！', W / 2, H * 0.40);
	  // 开始按钮
	  const btnW = Math.min(200, W * 0.5);
	  const btnH = 48;
	  const btnX = W / 2 - btnW / 2;
	  const btnY = H * 0.65;
	  ctx.fillStyle = COL.drumRim;
	  roundRect(ctx, btnX, btnY, btnW, btnH, 24);
	  ctx.fill();
	  ctx.strokeStyle = COL.drumGold;
	  ctx.lineWidth = 2;
	  ctx.stroke();
	  ctx.fillStyle = COL.textWhite;
	  ctx.font = `bold 20px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('击鼓开赛', W / 2, btnY + 31);
	  // 底部
	  ctx.fillStyle = 'rgba(240,230,211,0.4)';
	  ctx.font = `${Math.min(12, W * 0.03)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('Powered by GLM-5.2', W / 2, H * 0.92);
	  ctx.restore();
	}
	// 结算界面
	function drawResult(){
	  ctx.save();
	  ctx.fillStyle = 'rgba(11,22,32,0.9)';
	  ctx.fillRect(0, 0, W, H);
	  drawInkBg();
	  const dist = Math.floor(distance);
	  let title = '';
	  if(dist < 50) title = '龙游浅水';
	  else if(dist < 150) title = '乘风破浪';
	  else if(dist < 300) title = '势如破竹';
	  else title = '端午龙王';
	  ctx.fillStyle = COL.textGold;
	  ctx.font = `bold ${Math.min(32, W * 0.08)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.textAlign = 'center';
	  ctx.strokeStyle = '#000';
	  ctx.lineWidth = 4;
	  ctx.strokeText(title, W / 2, H * 0.22);
	  ctx.fillText(title, W / 2, H * 0.22);
	  ctx.fillStyle = COL.textWhite;
	  ctx.font = `bold ${Math.min(48, W * 0.12)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.strokeText(dist + 'm', W / 2, H * 0.35);
	  ctx.fillText(dist + 'm', W / 2, H * 0.35);
	  ctx.fillStyle = 'rgba(240,230,211,0.8)';
	  ctx.font = `${Math.min(14, W * 0.035)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('鼓动端阳破浪去，舵转千波解意来。', W / 2, H * 0.48);
	  ctx.fillText('GLM-5.2，知你写码深意，共此同舟Agent。', W / 2, H * 0.53);
	  const btnW = Math.min(200, W * 0.5);
	  const btnH = 48;
	  const btnX = W / 2 - btnW / 2;
	  const btnY = H * 0.64;
	  ctx.fillStyle = COL.drumRim;
	  roundRect(ctx, btnX, btnY, btnW, btnH, 24);
	  ctx.fill();
	  ctx.strokeStyle = COL.drumGold;
	  ctx.lineWidth = 2;
	  ctx.stroke();
	  ctx.fillStyle = COL.textWhite;
	  ctx.font = `bold 20px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('再赛一局', W / 2, btnY + 31);
	  ctx.fillStyle = 'rgba(240,230,211,0.4)';
	  ctx.font = `${Math.min(12, W * 0.03)}px "PingFang SC","Microsoft YaHei",sans-serif`;
	  ctx.fillText('Powered by GLM-5.2', W / 2, H * 0.80);
	  ctx.restore();
	}
	function roundRect(c, x, y, w, h, r){
	  c.beginPath();
	  c.moveTo(x + r, y);
	  c.lineTo(x + w - r, y);
	  c.arcTo(x + w, y, x + w, y + r, r);
	  c.lineTo(x + w, y + h - r);
	  c.arcTo(x + w, y + h, x + w - r, y + h, r);
	  c.lineTo(x + r, y + h);
	  c.arcTo(x, y + h, x, y + h - r, r);
	  c.lineTo(x, y + r);
	  c.arcTo(x, y, x + r, y, r);
	  c.closePath();
	}
	/* ===== 更新逻辑 ===== */
	function update(dt){
	  if(state !== STATE.PLAY) return;
	  timeLeft -= dt;
	  if(timeLeft <= 0){
	    timeLeft = 0;
	    state = STATE.RESULT;
	    return;
	  }
	  if(ringActive){
	    ringRadius -= ringSpeed;
	    if(ringRadius <= 0){
	      resetRing();
	    }
	  }
	  speed *= 0.985;
	  if(speed < 0.1) speed = 0;
	  distance += speed * dt;
	  drumScale += (1 - drumScale) * 0.15;
	  drumShake *= 0.85;
	  if(drumShake < 0.5) drumShake = 0;
	  boatBobPhase += dt * (2 + speed * 0.3);
	  const targetSquash = 1 + speed * 0.012;
	  boatSquash += (targetSquash - boatSquash) * 0.1;
	  bgOffset1 += speed * 0.2;
	  bgOffset2 += speed * 0.6;
	  bgOffset3 += speed * 1.2;
	  for(let i = floatTexts.length - 1; i >= 0; i--){
	    const ft = floatTexts[i];
	    ft.y += ft.vy;
	    ft.life -= dt * 1.5;
	    if(ft.life <= 0) floatTexts.splice(i, 1);
	  }
	  for(let i = splashParticles.length - 1; i >= 0; i--){
	    const p = splashParticles[i];
	    p.x += p.vx;
	    p.y += p.vy;
	    p.vy += 0.15;
	    p.life -= dt * 2;
	    if(p.life <= 0) splashParticles.splice(i, 1);
	  }
	  for(let i = hitParticles.length - 1; i >= 0; i--){
	    const p = hitParticles[i];
	    p.x += p.vx;
	    p.y += p.vy;
	    p.vx *= 0.95;
	    p.vy *= 0.95;
	    p.life -= dt * 2;
	    if(p.life <= 0) hitParticles.splice(i, 1);
	  }
	}
	/* ===== 主循环 ===== */
	function gameLoop(now){
	  requestAnimationFrame(gameLoop);
	  if(!lastTime) lastTime = now;
	  let dt = (now - lastTime) / 1000;
	  lastTime = now;
	  if(dt > 0.1) dt = 0.1;
	  const t = now / 1000;
	  ctx.clearRect(0, 0, W, H);
	  if(state === STATE.MENU){
	    drawMenu();
	    return;
	  }
	  update(dt);
	  // 背景
	  const bgGrd = ctx.createLinearGradient(0, 0, 0, H);
	  bgGrd.addColorStop(0, COL.skyTop);
	  bgGrd.addColorStop(0.4, COL.skyBot);
	  bgGrd.addColorStop(0.6, COL.water1);
	  bgGrd.addColorStop(1, '#061a1c');
	  ctx.fillStyle = bgGrd;
	  ctx.fillRect(0, 0, W, H);
	  // 月亮
	  ctx.save();
	  ctx.globalAlpha = 0.2;
	  ctx.fillStyle = '#f5d442';
	  ctx.shadowBlur = 20;
	  ctx.shadowColor = '#f5d442';
	  ctx.beginPath();
	  ctx.arc(W * 0.8, H * 0.12, 30, 0, Math.PI * 2);
	  ctx.fill();
	  ctx.restore();
	  drawMountains(bgOffset1);
	  drawWater(bgOffset2, t);
	  drawDragonBoat(t);
	  drawSplash();
	  drawWaves(bgOffset3, t);
	  // 鼓区域背景
	  ctx.save();
	  const drumGrd = ctx.createLinearGradient(0, H * 0.6, 0, H);
	  drumGrd.addColorStop(0, 'rgba(11,22,32,0)');
	  drumGrd.addColorStop(1, 'rgba(11,22,32,0.8)');
	  ctx.fillStyle = drumGrd;
	  ctx.fillRect(0, H * 0.6, W, H * 0.4);
	  ctx.restore();
	  drawDrum();
	  drawHitParticles();
	  drawFloatTexts();
	  drawUI();
	  if(state === STATE.RESULT){
	    drawResult();
	  }
	}
	requestAnimationFrame(gameLoop);
	})();
	</script>
