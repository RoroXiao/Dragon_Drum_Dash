<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>龙舟击鼓竞速小游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;background:#1a0a00}
canvas{display:block;width:100%;height:100%;-webkit-touch-callout:default}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W=0, H=0, dpr=1;

const STATE={MENU:0,PLAY:1,RESULT:2};
let state=STATE.MENU;

let speed=0, distance=0, timeLeft=35, lastTime=0;
let combo=0, maxCombo=0;
let bestDistance=parseInt(localStorage.getItem('dragonBoatBest')||'0');

let drumX=0, drumY=0, drumR=0, drumCenterR=0;
let ringRadius=0, ringActive=true, ringStartTime=0, ringDuration=2000;
let ringType='normal', ringColor='#ffd700';

let floatTexts=[];
let drumScale=1, drumShake=0, drumSquashY=1;
let drumRippleRadius=0, drumRippleAlpha=0;
let stickLeftAng=0, stickRightAng=0, stickLeftTarget=0, stickRightTarget=0, stickLeftVel=0, stickRightVel=0;
let boatY=0, boatBobPhase=0, boatSquash=1;
let bgOffset1=0, bgOffset2=0;

let flashAlpha=0, flashRadius=0, whiteFlashAlpha=0;
let audioCtx=null;

let isBrokenCombo=false, brokenComboTime=0, comboFlashTime=0;
let isFreeze=false, freezeTimer=0, isComeback=false, lastTickSec=-1;
let demoTime=0, showTutorial=true;
let difficultyLevel=0, showSpeedUp=false, speedUpAlpha=0;
let milestone100=false, milestone300=false, milestoneCombo10=false;
let milestoneAlpha=0, milestoneText='';

let wakeParticles=[], fallingLeaves=[];

let FW=0, FH=0, FL=0, FR=0, FT=0, FB=0;
let FW2=0, FH2=0;
let waterLineY=0;

class ObjectPool{
  constructor(f,r,s){this.factory=f;this.resetFn=r;this.pool=[];for(let i=0;i<s;i++)this.pool.push(f());}
  get(){return this.pool.length>0?this.pool.pop():this.factory();}
  release(o){this.resetFn(o);this.pool.push(o);}
}
const splashPool=new ObjectPool(()=>({x:0,y:0,vx:0,vy:0,life:0,size:0,color:''}),o=>{o.life=0},50);
const hitPool=new ObjectPool(()=>({x:0,y:0,vx:0,vy:0,life:0,size:0,color:''}),o=>{o.life=0},100);
let splashParticles=[], hitParticles=[];
let lanterns=[], clouds=[], kites=[];
let leftDecor=[], rightDecor=[];

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth; H=window.innerHeight;
  cvs.width=W*dpr; cvs.height=H*dpr;
  cvs.style.width=W+'px'; cvs.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  FW=Math.max(14,W*0.03);
  FH=Math.max(14,H*0.03);
  FW2=FW*0.7; FH2=FH*0.7;

  FL=FW; FR=W-FW; FT=FH; FB=H-FH;
  FH2=FH*0.7;

  drumR=Math.min(W*0.26,H*0.16);
  drumCenterR=drumR*0.38;
  drumX=W/2;
  drumY=H*0.80;
  waterLineY=H*0.45;
  boatY=H*0.43;

  initDecorations();
}
window.addEventListener('resize',resize);

function initDecorations(){
  leftDecor=[]; rightDecor=[]; lanterns=[]; kites=[]; clouds=[];

  leftDecor.push({type:'zongzi',x:FL-10,y:FT+45,size:18,phase:Math.random()*Math.PI*2,spd:1.3,rope:22});
  leftDecor.push({type:'zongzi',x:FL-10,y:FT+130,size:18,phase:Math.random()*Math.PI*2,spd:1.5,rope:22});
  leftDecor.push({type:'wormwood',x:FL-8,y:FT+85,size:24,phase:Math.random()*Math.PI*2,spd:1.1,rope:18});
  leftDecor.push({type:'wormwood',x:FL-8,y:FT+175,size:22,phase:Math.random()*Math.PI*2,spd:0.9,rope:18});
  leftDecor.push({type:'calamus',x:FL-8,y:FT+230,size:20,phase:Math.random()*Math.PI*2,spd:1.0,rope:16});
  leftDecor.push({type:'sachet',x:FL-8,y:FT+FT*0.65,size:12,phase:Math.random()*Math.PI*2,spd:1.8,rope:28,color:'#cc2936'});
  leftDecor.push({type:'sachet',x:FL-8,y:FT+FT*1.05,size:12,phase:Math.random()*Math.PI*2,spd:2.1,rope:28,color:'#ffd700'});

  rightDecor.push({type:'zongzi',x:FR+10,y:FT+45,size:18,phase:Math.random()*Math.PI*2,spd:1.3,rope:22});
  rightDecor.push({type:'zongzi',x:FR+10,y:FT+130,size:18,phase:Math.random()*Math.PI*2,spd:1.5,rope:22});
  rightDecor.push({type:'wormwood',x:FR+8,y:FT+85,size:24,phase:Math.random()*Math.PI*2,spd:1.1,rope:18});
  rightDecor.push({type:'wormwood',x:FR+8,y:FT+175,size:22,phase:Math.random()*Math.PI*2,spd:0.9,rope:18});
  rightDecor.push({type:'calamus',x:FR+8,y:FT+230,size:20,phase:Math.random()*Math.PI*2,spd:1.0,rope:16});
  rightDecor.push({type:'sachet',x:FR+8,y:FT+FT*0.65,size:12,phase:Math.random()*Math.PI*2,spd:1.8,rope:28,color:'#4d96ff'});
  rightDecor.push({type:'sachet',x:FR+8,y:FT+FT*1.05,size:12,phase:Math.random()*Math.PI*2,spd:2.1,rope:28,color:'#6bcb77'});

  lanterns.push({x:FL+70,y:FT-FW2-4,size:12,phase:Math.random()*Math.PI*2,spd:2.0,color:'#ff6b35'});
  lanterns.push({x:W/2,y:FT-FW2-4,size:14,phase:Math.random()*Math.PI*2,spd:1.7,color:'#ffd166'});
  lanterns.push({x:FR-70,y:FT-FW2-4,size:12,phase:Math.random()*Math.PI*2,spd:2.2,color:'#ff4757'});

  kites.push({x:W*0.08,y:FT+35,size:22+Math.random()*10,type:'dragon',wobble:Math.random()*Math.PI*2,spd:0.18+Math.random()*0.08});
  kites.push({x:W*0.35,y:FT+18,size:18+Math.random()*8,type:'fish',wobble:Math.random()*Math.PI*2,spd:0.14+Math.random()*0.06});
  kites.push({x:W*0.62,y:FT+42,size:20+Math.random()*10,type:'dragon',wobble:Math.random()*Math.PI*2,spd:0.16+Math.random()*0.07});
  kites.push({x:W*0.85,y:FT+22,size:16+Math.random()*8,type:'fish',wobble:Math.random()*Math.PI*2,spd:0.12+Math.random()*0.06});

  for(let i=0;i<4;i++){
    clouds.push({x:Math.random()*W,y:FT+10+Math.random()*(FT*0.18),w:60+Math.random()*70,spd:0.03+Math.random()*0.04,alpha:0.5+Math.random()*0.3});
  }
}

function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function playSound(freq,dur,type,vol){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(vol||0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}
function playTickSound(){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.setValueAtTime(1200,audioCtx.currentTime);g.gain.setValueAtTime(0.06,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.06);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.06);}
function playDeepDrumSound(){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(150,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(50,audioCtx.currentTime+1.5);g.gain.setValueAtTime(0.4,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+1.5);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+1.5);}
function playMilestoneSound(){playSound(523,0.15,'sine',0.2);setTimeout(()=>playSound(659,0.15,'sine',0.2),100);setTimeout(()=>playSound(784,0.2,'sine',0.25),200);}
function playLeafSound(){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(800,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(400,audioCtx.currentTime+0.3);g.gain.setValueAtTime(0.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.3);}

const COL={
  skyTop:'#ff6b35', skyMid:'#ff8c42', skyBot:'#ffd166',
  sunGlow:'#fff3b0', sunCore:'#ffffff',
  mountainFar:'rgba(139,90,43,0.4)', mountainNear:'rgba(101,67,33,0.6)',
  water1:'#1a6b7c', water2:'#2d8f8f', water3:'#3dbfbf', water4:'#5fd4d4',
  wave:'rgba(255,255,255,0.35)', waveHigh:'rgba(255,255,255,0.7)',
  drumFace:'#e6b800', drumFaceCenter:'#ffcc33', drumRim:'#990000', drumRimDark:'#4a0000', drumGold:'#ffd633',
  dragonBody:'#e60000', dragonBodyDark:'#990000', dragonBodyLight:'#ff4d4d',
  textWhite:'#fff8e7', textGold:'#ffd700',
  perfectCol:'#ff4757', goodCol:'#ffa502', missCol:'#747d8c', comboCol:'#2ed573',
  paddleWood:'#8B4513', headSkin:'#ffcc99', headband:'#cc0000',
  wormwoodGreen:'#4a7c3a', wormwoodLight:'#6b9b4a',
  zongziGreen:'#4a7c3a', zongziDark:'#2e5224', zongziLight:'#6b9b4a',
  calamusGreen:'#2d5a1e',
  frameWood:'#8B4513', frameWoodMid:'#9a6030', frameWoodLight:'#b87333',
  copper:'#b87333', copperLight:'#daa06d', copperDark:'#7a4f20',
  fiveRed:'#cc2936', fiveYellow:'#ffd700', fiveGreen:'#2ed573', fiveBlue:'#4d96ff', fiveBlack:'#333333',
  wakeWhite:'rgba(255,255,255,0.6)'
};

function initGame(){
  speed=0; distance=0; timeLeft=35; lastTime=0; combo=0; maxCombo=0;
  floatTexts=[]; drumScale=1; drumShake=0; drumSquashY=1; drumRippleRadius=0; drumRippleAlpha=0;
  stickLeftAng=-0.7; stickRightAng=0.7; stickLeftTarget=-0.7; stickRightTarget=0.7;
  stickLeftVel=0; stickRightVel=0;
  boatBobPhase=0; boatSquash=1; bgOffset1=0; bgOffset2=0;
  splashParticles.forEach(p=>splashPool.release(p)); hitParticles.forEach(p=>hitPool.release(p));
  splashParticles=[]; hitParticles=[]; wakeParticles=[]; fallingLeaves=[];
  flashAlpha=0; flashRadius=0; whiteFlashAlpha=0;
  isBrokenCombo=false; isFreeze=false; freezeTimer=0; isComeback=false; lastTickSec=-1;
  showTutorial=true;
  difficultyLevel=0; showSpeedUp=false; speedUpAlpha=0;
  milestone100=false; milestone300=false; milestoneCombo10=false;
  milestoneAlpha=0; milestoneText='';
  ringType='normal'; ringColor='#ffd700';
  resetRing();
}

function resetRing(){
  ringStartTime=performance.now();
  const base=distance>100 ? Math.max(1000,2000-difficultyLevel*120) : 2600;
  const r=Math.random();
  if(r<0.25){ringType='fast'; ringDuration=base*0.6; ringColor='#ff4757';}
  else if(r<0.45){ringType='slow'; ringDuration=base*1.35; ringColor='#4d96ff';}
  else if(r<0.65){ringType='accel'; ringDuration=base*0.9; ringColor='#ff6b35';}
  else if(r<0.80){ringType='decel'; ringDuration=base*1.1; ringColor='#2ed573';}
  else{ringType='normal'; ringDuration=base; ringColor='#ffd700';}
  ringRadius=drumR*2.8; ringActive=true;
}

function handleTap(e){
  initAudio();
  let x,y;
  if(e.touches&&e.touches.length>0){x=e.touches[0].clientX;y=e.touches[0].clientY;}
  else if(e.changedTouches&&e.changedTouches.length>0){x=e.changedTouches[0].clientX;y=e.changedTouches[0].clientY;}
  else{x=e.clientX;y=e.clientY;}

  if(state===STATE.MENU){state=STATE.PLAY;initGame();lastTime=performance.now();playSound(440,0.1,'square',0.1);return;}
  if(state===STATE.RESULT){
    const bw=Math.min(145,W*0.34),bh=44,gap=16,by=FT+(FB-FT)*0.76;
    const b1x=W/2-bw-gap/2,b2x=W/2+gap/2;
    if(x>b1x&&x<b1x+bw&&y>by&&y<by+bh){state=STATE.PLAY;initGame();lastTime=performance.now();playSound(440,0.1,'square',0.1);return;}
    if(x>b2x&&x<b2x+bw&&y>by&&y<by+bh){state=STATE.MENU;playSound(220,0.2,'sine',0.1);return;}
    return;
  }
  if(state!==STATE.PLAY||isFreeze)return;

  const ebw=78,ebh=26,ebx=FR-ebw-10,eby=FB-38;
  if(x>ebx&&x<ebx+ebw&&y>eby&&y<eby+ebh){state=STATE.RESULT;playSound(220,0.2,'sine',0.1);return;}

  if(!ringActive){triggerMiss();return;}

  const tHit=performance.now(), tCenter=ringStartTime+ringDuration;
  const diffT=Math.abs(tHit-tCenter);
  let wP=120+distance*0.005, wG=300+distance*0.01;
  if(timeLeft<=5){wP*=0.7;wG*=0.7;}

  if(diffT<wP){
    if(showTutorial) showTutorial=false;
    combo++; maxCombo=Math.max(maxCombo,combo);
    const bonus=8+combo*4; speed+=bonus;
    if(distance<5){speed+=bonus; addFloatText('起航！',drumX,drumY-drumR*2.4,'#ffd700');}
    addFloatText('完美 +'+bonus,drumX,drumY-drumR*1.6,COL.perfectCol);
    if(combo>1) addFloatText('Combo x'+combo,drumX,drumY-drumR*2.0,COL.comboCol);
    triggerHitExp(COL.perfectCol,30); flashAlpha=0.7; flashRadius=drumR;
    if(combo>=2) comboFlashTime=tHit;
    if(timeLeft<=5){isComeback=true;whiteFlashAlpha=1;triggerHitExp('#ffffff',100);}
    if(!milestoneCombo10&&combo>=10){milestoneCombo10=true;milestoneText='🎉 十连击!';milestoneAlpha=1;playMilestoneSound();}
    if(Math.random()<0.45){
      for(let i=0;i<3;i++){
        fallingLeaves.push({x:FL+Math.random()*(FR-FL),y:FT-8,size:9+Math.random()*5,vx:(Math.random()-0.5)*1.5,vy:0.6+Math.random()*0.8,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-0.5)*0.1,alpha:0.85+Math.random()*0.15,type:Math.random()>0.5?'wormwood':'calamus'});
      }
      playLeafSound();
    }
    playSound(880,0.18,'sine',0.25); resetRing();
  } else if(diffT<wG){
    if(showTutorial) showTutorial=false;
    combo++; maxCombo=Math.max(maxCombo,combo);
    const bonus=5+combo*2; speed+=bonus;
    if(distance<5){speed+=bonus; addFloatText('起航！',drumX,drumY-drumR*2.4,'#ffd700');}
    addFloatText('不错 +'+bonus,drumX,drumY-drumR*1.6,COL.goodCol);
    triggerHitExp(COL.goodCol,18);
    if(combo>=2) comboFlashTime=tHit;
    playSound(660,0.18,'sine',0.18); resetRing();
  } else {
    triggerMiss(); resetRing();
  }
  triggerDrumHit();
  stickLeftTarget=-0.05; stickRightTarget=0.05; stickLeftVel=18; stickRightVel=-18;
}

function triggerMiss(){combo=0;speed=Math.max(0,speed-1);addFloatText('失误',drumX,drumY-drumR*1.6,COL.missCol);isBrokenCombo=true;brokenComboTime=performance.now();playSound(150,0.25,'sawtooth',0.18);}
function triggerDrumHit(){
  drumScale=1.15; drumShake=8; drumSquashY=0.78;
  drumRippleRadius=drumCenterR*0.5; drumRippleAlpha=0.9;
  for(let i=0;i<Math.min(speed*2.5,22);i++){
    const p=splashPool.get();
    p.x=W/2+(Math.random()-0.5)*(FR-FL)*0.65;
    p.y=waterLineY+5+Math.random()*10;
    p.vx=(Math.random()-0.5)*4-speed*0.3; p.vy=-Math.random()*4-2; p.life=1; p.size=3+Math.random()*5; p.color=COL.waveHigh;
    splashParticles.push(p);
  }
}
function triggerHitExp(color,count){for(let i=0;i<count;i++){const ang=Math.random()*Math.PI*2,sp=3+Math.random()*10,p=hitPool.get();p.x=drumX;p.y=drumY;p.vx=Math.cos(ang)*sp;p.vy=Math.sin(ang)*sp;p.life=1;p.size=3+Math.random()*6;p.color=color;hitParticles.push(p);}}
function addFloatText(t,x,y,c){floatTexts.push({text:t,x,y,color:c,life:1,vy:-2.5});}

cvs.addEventListener('mousedown',function(e){e.preventDefault();handleTap(e);});
cvs.addEventListener('touchstart',function(e){e.preventDefault();handleTap(e);},{passive:false});

function drawStrokeText(text,x,y,font,fill,align){
  ctx.font=font;ctx.textAlign=align||'center';ctx.lineJoin='round';
  ctx.strokeStyle='#3d1f00';ctx.lineWidth=6;ctx.strokeText(text,x,y);
  ctx.lineWidth=2;ctx.strokeStyle='rgba(255,248,231,0.5)';ctx.strokeText(text,x,y);
  ctx.fillStyle=fill;ctx.fillText(text,x,y);
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);
  c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);
  c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);
  c.arcTo(x,y,x+r,y,r);c.closePath();
}
function rr(c,x,y,w,h,r){roundRect(c,x,y,w,h,r);}

// ─── WOODEN WINDOW FRAME ───
function drawWoodFrame(){
  ctx.save();
  // top bar
  const tg=ctx.createLinearGradient(FL,0,FR,0);
  tg.addColorStop(0,'#7a3d12');tg.addColorStop(0.15,COL.frameWoodLight);tg.addColorStop(0.5,COL.frameWoodMid);tg.addColorStop(0.85,COL.frameWoodLight);tg.addColorStop(1,'#7a3d12');
  ctx.fillStyle=tg;
  rr(ctx,0,0,W,FH,0);ctx.fill();
  ctx.strokeStyle='#3d1f00';ctx.lineWidth=1;ctx.strokeRect(0,0,W,FH);
  // wood grain lines on top bar
  ctx.strokeStyle='rgba(60,30,10,0.25)';ctx.lineWidth=1;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(FL,i*FH/3+2);ctx.lineTo(FR,i*FH/3+2);ctx.stroke();}
  // bottom bar
  const bg=ctx.createLinearGradient(FL,FB,FR,FB);
  bg.addColorStop(0,'#7a3d12');bg.addColorStop(0.15,COL.frameWoodLight);bg.addColorStop(0.5,COL.frameWoodMid);bg.addColorStop(0.85,COL.frameWoodLight);bg.addColorStop(1,'#7a3d12');
  ctx.fillStyle=bg;
  rr(ctx,0,FB,W,FH,0);ctx.fill();
  ctx.strokeStyle='#3d1f00';ctx.lineWidth=1;ctx.strokeRect(0,FB,W,FH);
  ctx.strokeStyle='rgba(60,30,10,0.25)';ctx.lineWidth=1;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(FL,FB+i*FH/3+2);ctx.lineTo(FR,FB+i*FH/3+2);ctx.stroke();}
  // left bar
  const lg=ctx.createLinearGradient(0,FT,0,FB);
  lg.addColorStop(0,'#7a3d12');lg.addColorStop(0.5,COL.frameWoodLight);lg.addColorStop(1,'#7a3d12');
  ctx.fillStyle=lg;
  rr(ctx,0,FT,FW,FB-FT,0);ctx.fill();
  ctx.strokeStyle='#3d1f00';ctx.lineWidth=1;ctx.strokeRect(0,FT,FW,FB-FT);
  // right bar
  const rg=ctx.createLinearGradient(0,FT,0,FB);
  rg.addColorStop(0,'#7a3d12');rg.addColorStop(0.5,COL.frameWoodLight);rg.addColorStop(1,'#7a3d12');
  ctx.fillStyle=rg;
  rr(ctx,FR,FT,FW,FB-FT,0);ctx.fill();
  ctx.strokeStyle='#3d1f00';ctx.lineWidth=1;ctx.strokeRect(FR,FT,FW,FB-FT);
  // wood grain vertical
  ctx.strokeStyle='rgba(60,30,10,0.2)';ctx.lineWidth=1;
  for(let i=0;i<2;i++){ctx.beginPath();ctx.moveTo(FW*0.3+i*FW*0.4,FT);ctx.lineTo(FW*0.3+i*FW*0.4,FB);ctx.stroke();}
  // copper nails at 4 inner corners
  const nx=FL+FW2/2, ny=FT+FH2/2;
  const corners=[[nx,ny],[FR-FW2/2,ny],[nx,FB-FH2/2],[FR-FW2/2,FB-FH2/2]];
  for(const [cx,cy] of corners){
    const ng=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,FW2*0.45);
    ng.addColorStop(0,COL.copperLight);ng.addColorStop(0.5,COL.copper);ng.addColorStop(1,COL.copperDark);
    ctx.fillStyle=ng;ctx.beginPath();ctx.arc(cx,cy,FW2*0.42,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#4a2a08';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(cx-1.5,cy-1.5,FW2*0.15,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ─── FIVE-COLOR ROPE BANNER (丝绸质感) ───
function drawColorBanner(){
  ctx.save();
  const ropeY=FT+FH-1, sag=7;
  const colors=[COL.fiveRed,COL.fiveYellow,COL.fiveGreen,COL.fiveBlue,'#cc2936'];
  const t=performance.now()/1000;
  // 顶部木杆
  const barG=ctx.createLinearGradient(0,FT+FH-4,0,FT+FH+2);
  barG.addColorStop(0,'#5c3d2e'); barG.addColorStop(0.5,'#8B4513'); barG.addColorStop(1,'#3d1f00');
  ctx.fillStyle=barG;rr(ctx,FL+FW2,FT+FH-3,FR-FL-FW2*2,5,2);ctx.fill();
  // 丝绸飘带（多段透明渐变）
  for(let i=0;i<colors.length;i++){
    const x1=FL+FW2+i*(FR-FL-FW2*2)/colors.length;
    const x2=x1+(FR-FL-FW2*2)/colors.length;
    const mid=(x1+x2)/2;
    const wave=Math.sin(t*1.5+i*0.5)*2;
    // 丝绸渐变（左暗→中亮→右暗）
    const silkG=ctx.createLinearGradient(x1,0,x2,0);
    silkG.addColorStop(0,colors[i]+'88'); silkG.addColorStop(0.3,colors[i]); silkG.addColorStop(0.5,colors[i]); silkG.addColorStop(0.7,colors[i]); silkG.addColorStop(1,colors[i]+'88');
    ctx.fillStyle=silkG;
    ctx.beginPath();
    ctx.moveTo(x1,ropeY-sag);
    ctx.bezierCurveTo(x1+(x2-x1)*0.3,ropeY+sag*0.3+wave, mid,ropeY+sag*0.5+wave, mid,ropeY);
    ctx.bezierCurveTo(mid,ropeY+sag*0.5+wave, x1+(x2-x1)*0.7,ropeY+sag*0.3+wave, x2,ropeY-sag);
    ctx.lineTo(x2,ropeY+3);
    ctx.bezierCurveTo(x1+(x2-x1)*0.7,ropeY+3+sag*0.4-wave, mid,ropeY+3+sag*0.6-wave, mid,ropeY+3+sag);
    ctx.bezierCurveTo(mid,ropeY+3+sag*0.6-wave, x1+(x2-x1)*0.3,ropeY+3+sag*0.4-wave, x1,ropeY+3);
    ctx.closePath();ctx.fill();
    // 丝绸高光
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.moveTo(x1+(x2-x1)*0.2,ropeY-sag*0.7);
    ctx.bezierCurveTo(x1+(x2-x1)*0.4,ropeY+sag*0.2+wave, mid,ropeY+sag*0.3+wave, mid,ropeY+sag*0.1);
    ctx.bezierCurveTo(mid,ropeY+sag*0.3+wave, x1+(x2-x1)*0.4,ropeY+sag*0.2+wave, x1+(x2-x1)*0.2,ropeY-sag*0.7);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

// ─── LANTERN ───
function drawLantern(lx,ly,ls,color,t,ph,sp){
  ctx.save();
  ctx.translate(lx,ly);ctx.rotate(Math.sin(t*sp+ph)*0.28);
  ctx.shadowBlur=14;ctx.shadowColor=color;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(0,0,ls,ls*1.35,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#cc0000';rr(ctx,-ls*0.6,-ls*1.35,ls*1.2,ls*0.3,2);ctx.fill();
  ctx.fillStyle=COL.copper;rr(ctx,-ls*0.35,ls*1.3,ls*0.7,ls*0.25,1);ctx.fill();
  ctx.strokeStyle='#8B4513';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-ls*1.35);ctx.lineTo(0,-ls*1.7);ctx.stroke();
  ctx.restore();
}

// ─── ROPE ───
function drawRope(x1,y1,x2,y2,t){
  ctx.save();
  ctx.strokeStyle='#8B4513';ctx.lineWidth=1.2;ctx.setLineDash([2,3]);
  const mx=(x1+x2)/2,my=(y1+y2)/2+Math.sin(t*2)*3;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

// ─── DECORATIONS ───
function drawZongzi(x,y,s,t,ph,sp){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(t*sp+ph)*0.18);
  // 阴影
  ctx.shadowColor='rgba(0,0,0,0.25)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
  // 粽叶底层（深色）
  const leafG=ctx.createLinearGradient(0,-s*0.8,0,s*0.5);
  leafG.addColorStop(0,'#6b9b4a'); leafG.addColorStop(0.5,'#4a7c3a'); leafG.addColorStop(1,'#2e5224');
  ctx.fillStyle=leafG;ctx.strokeStyle=COL.zongziDark;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-s*0.8);
  ctx.bezierCurveTo(s*0.4,-s*0.5,s*0.8,s*0.1,s*0.7,s*0.5);
  ctx.lineTo(-s*0.7,s*0.5);
  ctx.bezierCurveTo(-s*0.8,s*0.1,-s*0.4,-s*0.5,0,-s*0.8);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
  // 粽叶交叉编织纹理
  ctx.save(); ctx.clip();
  ctx.strokeStyle='rgba(30,50,20,0.3)'; ctx.lineWidth=1;
  for(let i=-3;i<=3;i++){
    ctx.beginPath();
    ctx.moveTo(-s*0.8+i*s*0.25,-s*0.8); ctx.lineTo(s*0.8+i*s*0.25,s*0.5); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s*0.8,-s*0.8+i*s*0.2); ctx.lineTo(s*0.8,s*0.5+i*s*0.2); ctx.stroke();
  }
  // 高光面
  const hlG=ctx.createLinearGradient(0,-s*0.8,0,0);
  hlG.addColorStop(0,'rgba(180,220,140,0.4)'); hlG.addColorStop(1,'rgba(180,220,140,0)');
  ctx.fillStyle=hlG;
  ctx.beginPath();ctx.moveTo(0,-s*0.8);ctx.lineTo(s*0.3,0);ctx.lineTo(-s*0.3,0);ctx.closePath();ctx.fill();
  ctx.restore();
  // 绑绳（带凹陷阴影）
  ctx.strokeStyle='rgba(180,140,40,0.8)'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(s*0.35,s*0.25);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(-s*0.35,s*0.25);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s*0.2,s*0.1);ctx.lineTo(s*0.2,s*0.1);ctx.stroke();
  // 绳子高光
  ctx.strokeStyle='rgba(255,230,100,0.5)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(s*0.35,s*0.25);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(-s*0.35,s*0.25);ctx.stroke();
  ctx.restore();
}
function drawWormwood(x,y,s,t,ph,sp){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(t*sp+ph)*0.12);
  ctx.strokeStyle=COL.calamusGreen;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-s);ctx.stroke();
  for(let i=0;i<5;i++){
    const ly=-s*(0.2+i*0.15),lx=(i%2===0?1:-1)*(7+Math.random()*3);
    ctx.fillStyle=i%2===0?COL.wormwoodGreen:COL.wormwoodLight;
    ctx.beginPath();ctx.ellipse(lx,ly,3,10,(i%2===0?0.3:-0.3),0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawCalamus(x,y,s,t,ph,sp){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(t*sp+ph)*0.15);
  ctx.fillStyle=COL.calamusGreen;
  ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*0.12,-s*0.3);ctx.lineTo(-s*0.12,-s*0.3);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#1a3a0e';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-s*0.3);ctx.lineTo(0,s*0.2);ctx.stroke();
  for(let i=0;i<4;i++){
    ctx.fillStyle=COL.wormwoodGreen;
    ctx.beginPath();ctx.ellipse(3,-s*0.2+i*s*0.12,2,7,0.2,0,Math.PI*2);ctx.fill();

}
function drawSachet(x,y,s,color,t,ph,sp){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(t*sp+ph)*0.22);
  ctx.fillStyle=color;ctx.strokeStyle='#5c3d2e';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,0,s,s*1.1,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(-3,-s-5);ctx.lineTo(3,-s-5);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-s*0.5,s*0.3+i*s*0.3);ctx.lineTo(s*0.5,s*0.3+i*s*0.3);ctx.stroke();}
  ctx.restore();
}
function drawDecorations(t){
  ctx.save();
  for(const d of leftDecor){
    drawRope(d.x,FT+FH-3,d.x,d.y,t);
    if(d.type==='zongzi')drawZongzi(d.x,d.y,d.size,t,d.phase,d.spd);
    else if(d.type==='wormwood')drawWormwood(d.x,d.y,d.size,t,d.phase,d.spd);
    else if(d.type==='calamus')drawCalamus(d.x,d.y,d.size,t,d.phase,d.spd);
    else if(d.type==='sachet')drawSachet(d.x,d.y,d.size,d.color,t,d.phase,d.spd);
  }
  for(const d of rightDecor){
    drawRope(d.x,FT+FH-3,d.x,d.y,t);
    if(d.type==='zongzi')drawZongzi(d.x,d.y,d.size,t,d.phase,d.spd);
    else if(d.type==='wormwood')drawWormwood(d.x,d.y,d.size,t,d.phase,d.spd);
    else if(d.type==='calamus')drawCalamus(d.x,d.y,d.size,t,d.phase,d.spd);
    else if(d.type==='sachet')drawSachet(d.x,d.y,d.size,d.color,t,d.phase,d.spd);
  }
  for(const l of lanterns)drawLantern(l.x,l.y,l.size,l.color,t,l.phase,l.spd);
  for(const k of kites){
    k.x+=k.spd;k.wobble+=0.012;
    if(k.x>W+60)k.x=-60;
    drawKite(k.x,k.y,k.size,k.type,t,k.wobble);
  }
  ctx.restore();
}
function drawKite(kx,ky,ks,type,t,wob){
  ctx.save();
  const wx=Math.sin(t*0.5+wob)*8,wy=Math.sin(t*0.3+wob)*5;
  ctx.translate(kx+wx,ky+wy);
  ctx.globalAlpha=0.75;
  if(type==='dragon'){
    ctx.fillStyle='#ff6b35';
    ctx.beginPath();ctx.moveTo(0,-ks);ctx.quadraticCurveTo(ks,-ks/2,0,ks);ctx.quadraticCurveTo(-ks,-ks/2,0,-ks);ctx.fill();
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.moveTo(0,-ks*0.5);ctx.lineTo(ks*0.3,0);ctx.lineTo(0,ks*0.5);ctx.lineTo(-ks*0.3,0);ctx.closePath();ctx.fill();
  } else {
    ctx.fillStyle='#4d96ff';ctx.beginPath();ctx.ellipse(0,0,ks*0.5,ks,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6b6b';ctx.beginPath();ctx.ellipse(0,-ks*0.3,ks*0.3,ks*0.5,0,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=0.75;
  ctx.strokeStyle='#5c3d2e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,ks);ctx.lineTo(0,ks+28);ctx.stroke();
  ctx.restore();
}
function drawFallingLeaves(){
  ctx.save();
  for(const l of fallingLeaves){
    ctx.globalAlpha=l.alpha;
    ctx.save();ctx.translate(l.x,l.y);ctx.rotate(l.rot);
    if(l.type==='wormwood'){
      ctx.fillStyle=COL.wormwoodGreen;
      ctx.beginPath();ctx.ellipse(0,0,3,9,0.3,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=COL.calamusGreen;
      ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(2.5,0);ctx.lineTo(-2.5,0);ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();
}

// ─── SCENE LAYERS ───
function drawSky(){
  const g=ctx.createLinearGradient(FL,FT,FL,FB);
  g.addColorStop(0,'#ff6b35');g.addColorStop(0.35,'#ff8c42');g.addColorStop(0.65,'#ffd166');g.addColorStop(0.82,'#1a6b7c');g.addColorStop(1,'#5fd4d4');
  ctx.fillStyle=g;ctx.fillRect(FL,FT,FR-FL,FB-FT);
}
function drawSun(t){
  ctx.save();
  ctx.beginPath();ctx.rect(FL,FT,FR-FL,FB-FT);ctx.clip();
  ctx.globalAlpha=0.22;
  ctx.fillStyle=COL.sunGlow;ctx.shadowBlur=50;ctx.shadowColor=COL.sunGlow;
  ctx.beginPath();ctx.arc(FR-FW2-50,FT+60,32+Math.sin(t*3)*5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.fillStyle=COL.sunCore;ctx.shadowBlur=25;ctx.shadowColor=COL.sunCore;
  ctx.beginPath();ctx.arc(FR-FW2-50,FT+60,22,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
}
function drawClouds(){
  ctx.save();ctx.beginPath();ctx.rect(FL,FT,FR-FL,FB-FT);ctx.clip();
  for(const c of clouds){
    c.x-=c.spd;if(c.x<-c.w)c.x=FR+c.w;
    ctx.fillStyle=`rgba(255,255,255,${c.alpha})`;
    ctx.beginPath();ctx.ellipse(c.x,c.y,c.w,c.w*0.32,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawMountains(){
  ctx.save();ctx.beginPath();ctx.rect(FL,FT,FR-FL,FB-FT);ctx.clip();
  const mw=(FR-FL)*3,ox=-(bgOffset1%(mw/2));
  const mBot=waterLineY;
  ctx.fillStyle=COL.mountainFar;
  ctx.beginPath();ctx.moveTo(FL+ox,mBot);
  for(let x=0;x<=mw;x+=90){
    const h=50+Math.sin((x+100)*0.003)*60+Math.sin((x+200)*0.007)*36;
    ctx.quadraticCurveTo(FL+ox+x+45,mBot-h-20,FL+ox+x+90,mBot-h);
  }
  ctx.lineTo(FL+ox+mw,mBot);ctx.closePath();ctx.fill();
  ctx.fillStyle=COL.mountainNear;
  ctx.beginPath();ctx.moveTo(FL+ox,mBot);
  for(let x=0;x<=mw;x+=65){
    const h=38+Math.sin((x+500)*0.005)*48+Math.cos((x+300)*0.009)*30;
    ctx.quadraticCurveTo(FL+ox+x+32,mBot-h-14,FL+ox+x+65,mBot-h);
  }
  ctx.lineTo(FL+ox+mw,mBot);ctx.closePath();ctx.fill();
  ctx.restore();
}
function drawWater(t){
  ctx.save();ctx.beginPath();ctx.rect(FL,waterLineY,FR-FL,FB-waterLineY);ctx.clip();
  const g=ctx.createLinearGradient(0,waterLineY,0,FB);
  g.addColorStop(0,COL.water1);g.addColorStop(0.35,COL.water2);g.addColorStop(0.7,COL.water3);g.addColorStop(1,COL.water4);
  ctx.fillStyle=g;ctx.fillRect(FL,waterLineY,FR-FL,FB-waterLineY);
  // wave rows
  ctx.globalAlpha=0.5;ctx.strokeStyle=COL.wave;ctx.lineWidth=2;
  const rows=7;
  for(let row=0;row<rows;row++){
    const baseY=waterLineY+row*(FB-waterLineY)/rows;
    ctx.beginPath();
    for(let x=FL;x<FR;x+=3){
      const y=baseY+Math.sin((x+bgOffset2*2.5+row*110)*0.018+t*2.5)*(4+row*1.2);
      if(x===FL)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  // wake particles
  for(const w of wakeParticles){
    ctx.globalAlpha=w.life*0.55;ctx.fillStyle=COL.wakeWhite;
    ctx.beginPath();ctx.ellipse(w.x,w.y,w.size*1.5,w.size*0.4,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ─── DRAGON BOAT (高保真矢量重绘) ───
// ====== 龙舟绘制函数 ======
// 整个龙舟以坐标原点(0,0)为中心绘制，通过s缩放到屏幕大小
function drawDragonBoat(t){
  ctx.save();
  // 船身宽度比例
  const bW = W * 0.22;
  const s = bW / 180; // 缩放因子：180 是龙舟设计基准宽度
  ctx.translate(W/2, boatY + Math.sin(boatBobPhase)*5);
  ctx.scale(boatSquash*s, s);

  // ── 落地阴影（让龙舟有浮在水面上的体积感）──
  ctx.save();
  ctx.shadowColor='rgba(20,10,5,0.45)'; ctx.shadowBlur=12; ctx.shadowOffsetY=6;
  ctx.fillStyle='rgba(20,10,5,0.2)';
  ctx.beginPath();
  ctx.ellipse(0,20,95,8,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── 船体底部波浪金边（龙舟特色装饰）──
  // 金边曲线间隔 x+=20（原18），更稀疏自然
  ctx.save();
  ctx.shadowColor='rgba(255,200,50,0.4)'; ctx.shadowBlur=6;
  const goldTrimGrad = ctx.createLinearGradient(0,8,0,22);
  goldTrimGrad.addColorStop(0,'#fff0a0');   // 高光
  goldTrimGrad.addColorStop(0.5,'#ffd633');  // 主体
  goldTrimGrad.addColorStop(1,'#cc9900');    // 暗部
  ctx.fillStyle=goldTrimGrad;
  ctx.beginPath();
  ctx.moveTo(-90,12);
  for(let x=-90;x<=90;x+=20){ctx.quadraticCurveTo(x+10,24,x+20,12);}
  ctx.lineTo(90,18);ctx.lineTo(-90,18);ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#8a6800'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();

  // ── 船身主体（三层木纹渐变：高光→主体→阴影）──
  // 颜色可自定义，如改 #B22222 更朱红，改 #8B0000 更深沉
  const hullGrad = ctx.createLinearGradient(0,-14,0,14);
  hullGrad.addColorStop(0,   '#8B4513');  // 高光层（顶部反光）
  hullGrad.addColorStop(0.3, '#654321');  // 主体层
  hullGrad.addColorStop(0.7, '#4e3221');  // 过渡层
  hullGrad.addColorStop(1,   '#3e2723');  // 阴影层（底部暗部）
  ctx.fillStyle=hullGrad;
  ctx.beginPath();
  ctx.moveTo(-90,12); ctx.bezierCurveTo(-60,-8,60,-8,90,12); ctx.lineTo(78,-10); ctx.lineTo(-78,-10); ctx.closePath();
  ctx.fill();
  // 木纹叠层（5 层半透明纹路，模拟真实木质感）
  ctx.save();
  ctx.clip();
  for(let i=0;i<5;i++){
    ctx.strokeStyle=`rgba(90,20,10,${0.08+i*0.04})`; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(-90,-8+i*5); ctx.bezierCurveTo(-50,-12+i*5,50,-12+i*5,90,-8+i*5); ctx.stroke();
  }
  // 暗部叠加
  const shadeGrad=ctx.createLinearGradient(0,-10,0,12);
  shadeGrad.addColorStop(0,'rgba(0,0,0,0)'); shadeGrad.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=shadeGrad; ctx.fillRect(-90,-14,180,28);
  ctx.restore();
  ctx.strokeStyle='#3d1f00'; ctx.lineWidth=2.5; ctx.stroke();

  // ── 龙鳞（多层菱形阵列，表现重叠层次感）──
  // 4 排鳞片，每排数量递减，形成龙舟鳞甲效果
  for(let row=0;row<4;row++){
    const sy=-10-row*6, sw=140-row*16, count=11-row;
    for(let i=0;i<count;i++){
      const sx=-sw/2+i*(sw/count)+(row%2)*(sw/count*0.5);
      const scaleW=7, scaleH=6;
      ctx.save();
      ctx.translate(sx,sy);
      // 单片鳞：顶部高光→底部暗影渐变
      const sg=ctx.createLinearGradient(0,-scaleH,0,scaleH);
      sg.addColorStop(0,'#fff3a0');    // 顶部高光
      sg.addColorStop(0.3,'#ffd633');   // 亮金
      sg.addColorStop(0.7,'#cc9900');   // 暗金
      sg.addColorStop(1,'#8a6800');     // 底部暗影
      ctx.fillStyle=sg;
      ctx.beginPath();
      ctx.moveTo(0,-scaleH); ctx.quadraticCurveTo(scaleW*0.6,-scaleH*0.2,0,scaleH); ctx.quadraticCurveTo(-scaleW*0.6,-scaleH*0.2,0,-scaleH); ctx.closePath();
      ctx.fill();
      // 鳞片高光面
      ctx.fillStyle='rgba(255,255,200,0.35)';
      ctx.beginPath();
      ctx.moveTo(0,-scaleH*0.8); ctx.quadraticCurveTo(scaleW*0.3,-scaleH*0.3,0,-scaleH*0.2); ctx.quadraticCurveTo(-scaleW*0.3,-scaleH*0.3,0,-scaleH*0.8); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(100,60,0,0.4)'; ctx.lineWidth=0.5; ctx.stroke();
      ctx.restore();
    }
  }

  // ── 桨手（划桨动作随速度变化）──

}

    ctx.shadowBlur=18*flashPulse;ctx.shadowColor=hCol;
    ctx.strokeStyle=`rgba(245,212,66,${rA.toFixed(2)})`;ctx.lineWidth=4*flashPulse;
    ctx.beginPath();ctx.ellipse(0,0,ringRadius,ringRadius*0.30,0,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=12;ctx.shadowColor=ringColor;
    ctx.strokeStyle=ringColor;ctx.globalAlpha=rA*0.5;ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(0,0,ringRadius+3,ringRadius*0.30+2,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  // ── 鼓槌（从上方落下击鼓姿态，以握柄顶部为支点） ──
  {
    const headR = drumR * 0.12;
    const handleLen = drumR * 0.55;
    const gripW = drumR * 0.11;
    const tipW  = drumR * 0.05;

    function drawOneStick(px, py, angle) {
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle);
      // 支点在原点(手握处)，柄向下延伸到 y=handleLen，槌头在 y=0 最下端
      // ─ 锥形木柄（上粗下细）──
      const hg = ctx.createLinearGradient(-gripW, 0, gripW, 0);
      hg.addColorStop(0, '#4a2008');
      hg.addColorStop(0.3, '#a06030');
      hg.addColorStop(0.5, '#b87333');
      hg.addColorStop(0.7, '#a06030');
      hg.addColorStop(1, '#4a2008');
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.moveTo(-tipW / 2, 0);
      ctx.lineTo( tipW / 2, 0);
      ctx.lineTo( gripW / 2, handleLen);
      ctx.lineTo(-gripW / 2, handleLen);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a1805';
      ctx.lineWidth = 0.6;
      ctx.stroke();
      // ─ 木纹 ──
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(-tipW / 2, 0);
      ctx.lineTo(tipW / 2, 0);
      ctx.lineTo(gripW / 2, handleLen);
      ctx.lineTo(-gripW / 2, handleLen);
      ctx.closePath();
      ctx.clip();
      ctx.strokeStyle = 'rgba(60,25,5,0.15)';
      ctx.lineWidth = 0.8;
      for (let i = -3; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(i * tipW / 6, 0);
        ctx.lineTo(i * gripW / 6, handleLen);
        ctx.stroke();
      }
      // 握柄防滑缠布
      const cs = handleLen * 0.8;
      ctx.strokeStyle = 'rgba(180,50,30,0.35)';
      ctx.lineWidth = 2.5;
      for (let y = cs; y < handleLen; y += 4) {
        const t2 = (y - cs) / (handleLen - cs);
        const w = tipW + (gripW - tipW) * t2;
        ctx.beginPath();
        ctx.moveTo(-w / 2, y);
        ctx.lineTo( w / 2, y);
        ctx.stroke();
      }
      ctx.restore();
      // ─ 绑扎环 ──
      const bPos = handleLen * 0.15;
      const bW = tipW + (gripW - tipW) * 0.15;
      ctx.strokeStyle = '#cc0000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-bW / 2 - 1, bPos);
      ctx.lineTo( bW / 2 + 1, bPos);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,150,150,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-bW / 2, bPos - 1);
      ctx.lineTo( bW / 2, bPos - 1);
      ctx.stroke();
      // ─ 槌头（球形，在 y=0）──
      const bg2 = ctx.createRadialGradient(-headR * 0.25, -headR * 0.25, 0, 0, 0, headR);
      bg2.addColorStop(0, '#ee5555');
      bg2.addColorStop(0.5, '#cc0000');
      bg2.addColorStop(1, '#550000');
      ctx.fillStyle = bg2;
      ctx.beginPath();
      ctx.arc(0, 0, headR, 0, Math.PI * 2);
      ctx.fill();
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, headR, 0, Math.PI * 2);
      ctx.clip();
      ctx.strokeStyle = 'rgba(80,0,0,0.3)';
      ctx.lineWidth = 1.2;
      for (let i = -headR * 2; i < headR * 2; i += 3.5) {
        ctx.beginPath();
        ctx.moveTo(i - headR, -headR);
        ctx.lineTo(i + headR, headR);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(i + headR, -headR);
        ctx.lineTo(i - headR, headR);
        ctx.stroke();
      }
      ctx.restore();
      ctx.fillStyle = 'rgba(255,180,180,0.35)';
      ctx.beginPath();
      ctx.arc(-headR * 0.3, -headR * 0.3, headR * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#330000';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(0, 0, headR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // 左槌支点：鼓面上方左侧；静止 angle=-0.7（向外抬起），击打 target=-0.05
    // 鼓槌角度跟随光环收缩进度联动：光环越近中心，鼓槌越向下压
    let stickProgress = 0;
    if(ringActive && ringRadius > 0){
      stickProgress = Math.max(0, Math.min(1, 1 - (ringRadius - drumCenterR) / (drumR * 2.8 - drumCenterR)));
    }
    // 蓄力下压：progress 0→1 时左槌额外下压 0→0.45，右槌额外下压 0→-0.45
    const pressOffset = stickProgress * 0.45;
    drawOneStick(-drumR * 0.5, -drumR * 0.5, stickLeftAng + pressOffset);
    drawOneStick(drumR * 0.5, -drumR * 0.5, stickRightAng - pressOffset);
  }

  ctx.restore();
}

// ─── UPDATE ───
function update(dt){
  if(state!==STATE.PLAY)return;
  if(isFreeze){freezeTimer+=dt;if(freezeTimer>=1.8){isFreeze=false;state=STATE.RESULT;}return;}
  timeLeft-=dt;
  const nLvl=Math.min(6,Math.floor(distance/60));
  if(nLvl>difficultyLevel){difficultyLevel=nLvl;showSpeedUp=true;speedUpAlpha=1;playSound(600,0.08,'square',0.1);}
  const cs=Math.ceil(timeLeft);
  if(timeLeft<=5&&timeLeft>0&&cs!==lastTickSec){playTickSound();lastTickSec=cs;}
  if(timeLeft<=0){timeLeft=0;isFreeze=true;freezeTimer=0;ringActive=false;playDeepDrumSound();return;}
  if(!milestone100&&distance>=100){milestone100=true;milestoneText='🏆 百米先锋!';milestoneAlpha=1;playMilestoneSound();}
  if(!milestone300&&distance>=300){milestone300=true;milestoneText='🔥 势如破竹!';milestoneAlpha=1;playMilestoneSound();}
  if(ringActive){
    let pr=(performance.now()-ringStartTime)/ringDuration;
    if(ringType==='accel')pr=pr*pr*pr;
    else if(ringType==='decel')pr=1-Math.pow(1-pr,3);
    ringRadius=drumR*2.8-(drumR*2.8-drumCenterR)*pr;
    const rawPr=(performance.now()-ringStartTime)/ringDuration;
    if(rawPr>1.35){triggerMiss();resetRing();}
  }
  speed*=0.996;if(speed<0.1)speed=0;
  distance+=speed*dt;
  drumScale+=(1-drumScale)*0.18;drumSquashY+=(1-drumSquashY)*0.15;
  drumShake*=0.82;if(drumShake<0.5)drumShake=0;
  drumRippleRadius+=180*dt;drumRippleAlpha*=0.88;
  // spring-back drum sticks
  stickLeftVel+=(-0.7-stickLeftAng)*40*dt;stickLeftVel*=0.72;stickLeftAng+=stickLeftVel*dt;
  stickRightVel+=(0.7-stickRightAng)*40*dt;stickRightVel*=0.72;stickRightAng+=stickRightVel*dt;
  // sync boat sticks
  let bstAng=0;
  if(speed>12)bstAng=Math.sin(performance.now()/1000*24)*1.8;
  else if(speed>0.5)bstAng=Math.sin(performance.now()/1000*10)*1.2;
  if(!isFreeze){} // keep manual control during hit
  boatBobPhase+=dt*(2.5+speed*0.35);
  const tsq=1+speed*0.015;boatSquash+=(tsq-boatSquash)*0.12;
  bgOffset1+=speed*0.25;bgOffset2+=speed*0.7;
  if(speed>4){
    for(let i=0;i<Math.min(Math.floor(speed/2.5),4);i++){
      const p=splashPool.get();
      p.x=W/2-95+Math.random()*8;p.y=waterLineY+3+Math.random()*6;
      p.vx=-1.2-Math.random()*2.5;p.vy=-1.2+Math.random()*2.5;p.life=1;p.size=2+Math.random()*4;p.color='#fff';
      splashParticles.push(p);
    }
    wakeParticles.push({x:W/2-90-Math.random()*15,y:waterLineY+4,size:4+Math.random()*5,life:1,vx:-speed*0.8});
  }
  for(let i=wakeParticles.length-1;i>=0;i--){const w=wakeParticles[i];w.x+=w.vx;w.life-=dt*1.5;w.size*=1.02;if(w.life<=0)wakeParticles.splice(i,1);}
  flashRadius+=450*dt;flashAlpha*=0.88;whiteFlashAlpha*=0.88;
  speedUpAlpha*=0.96;milestoneAlpha*=0.97;
  for(let i=fallingLeaves.length-1;i>=0;i--){const l=fallingLeaves[i];l.x+=l.vx;l.y+=l.vy;l.rot+=l.rotSpd;l.alpha-=dt*0.5;if(l.alpha<=0||l.y>FB+20)fallingLeaves.splice(i,1);}
  for(let i=floatTexts.length-1;i>=0;i--){const f=floatTexts[i];f.y+=f.vy;f.life-=dt*1.8;if(f.life<=0)floatTexts.splice(i,1);}
  for(let i=splashParticles.length-1;i>=0;i--){const p=splashParticles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=dt*2.2;if(p.life<=0){splashParticles.splice(i,1);splashPool.release(p);}}
  for(let i=hitParticles.length-1;i>=0;i--){const p=hitParticles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=dt*2.2;if(p.life<=0){hitParticles.splice(i,1);hitPool.release(p);}}
}

// ─── MAIN LOOP ───
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  if(!lastTime)lastTime=now;
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.12)dt=0.12;
  const t=now/1000;
  ctx.clearRect(0,0,W,H);

  if(state===STATE.MENU){drawMenu();return;}

  update(dt);

  // 1. sky bg
  drawSky();
  // 2. sun
  drawSun(t);
  // 3. scene clip
  ctx.save();ctx.beginPath();ctx.rect(FL,FT,FR-FL,FB-FT);ctx.clip();
  drawClouds();
  drawMountains();
  drawWater(t);
  drawFallingLeaves();
  // boat
  ctx.save();ctx.beginPath();ctx.rect(FL,FT,FR-FL,FB-FT);ctx.clip();
  drawDragonBoat(t);
  ctx.restore();
  ctx.restore(); // end scene clip

  // 4. effects
  drawDrumStand();
  drawDrum();
  drawDrumSticks();
  drawFlash();
  drawSplash();
  drawHitParticles();
  drawFloatTexts();
  drawMilestone();
  drawSpeedUp();
  drawUI(t);
  if(showTutorial)drawTutorial();
  if(isFreeze)drawFreezeText();
  if(state===STATE.RESULT)drawResult(t);

  // 5. topmost frame + decorations (outside scene clip)
  drawWoodFrame();
  drawColorBanner();
  drawDecorations(t);
}

resize();
requestAnimationFrame(gameLoop);
})();
</script>
